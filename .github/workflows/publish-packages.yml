name: Publish Packages

run-name: Publish ${{ inputs.experimental && 'experimental' || 'normal' }} packages

on:
  workflow_dispatch:
    inputs:
      experimental:
        description: "Publish with the experimental npm tag"
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-packages
  cancel-in-progress: false

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
    steps:
      - name: Read root package.json version
        id: read
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(gh api "repos/${{ github.repository }}/contents/package.json?ref=${{ github.sha }}" \
            -H "Accept: application/vnd.github.raw" | jq -r '.version')"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

  publish:
    name: Publish v${{ needs.version.outputs.version }}
    needs: version
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm-publish
    env:
      PUBLISH_SCRIPT: ${{ inputs.experimental && 'deploy:experimental' || 'deploy' }}

    steps:
      - name: Require repository admin permissions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          permission="$(gh api repos/${{ github.repository }}/collaborators/${{ github.actor }}/permission --jq .permission 2>/dev/null || true)"

          if [ "${permission}" != "admin" ]; then
            echo "::error::Only repository admins can publish packages. ${{ github.actor }} has '${permission:-none}' permissions."
            exit 1
          fi

      - name: Checkout publish branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install

      - name: Publish packages
        run: pnpm ${{ env.PUBLISH_SCRIPT }}

      - name: Tag the published commit
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists; skipping."
            exit 0
          fi

          git tag -a "v${VERSION}" -m "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub release from changelog
        if: ${{ !inputs.experimental }}
        env:
          VERSION: ${{ needs.version.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          pnpm tsx cli/deploy/print-release-notes.ts "${VERSION}" > release-notes.md
          gh release create "v${VERSION}" --title "v${VERSION}" --notes-file release-notes.md
