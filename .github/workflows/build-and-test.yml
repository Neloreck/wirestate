name: Build and Test

on:
  push:
    branches:
      - main
      - dev
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-lib:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install

      - name: Restore ESLint cache
        uses: actions/cache@v5
        with:
          path: .eslintcache
          key: eslint-${{ hashFiles('eslint.config.mjs', 'pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            eslint-${{ hashFiles('eslint.config.mjs', 'pnpm-lock.yaml') }}-

      - run: pnpm lint --cache

      - run: pnpm format:check

      - run: pnpm typecheck && pnpm typecheck:cli

      - run: pnpm test --maxWorkers=100%

      - run: pnpm build:dts

      - run: pnpm build:cjs

      - run: pnpm build:esm

      - run: pnpm build:pkg

      - run: pnpm test:e2e

      - name: Archive build artifacts
        working-directory: target/
        run: zip -qq -r package.zip dist/ pkg/

      - name: Upload build package
        uses: actions/upload-artifact@v7
        with:
          if-no-files-found: error
          name: package
          path: target/package.zip
          retention-days: 1

  build-extension:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - run: pnpm typecheck:extension

      - run: pnpm test:extension

      - run: pnpm build:extension

      - name: Archive extension build
        working-directory: extension/dist
        run: zip -qq -r "$GITHUB_WORKSPACE/extension.zip" .

      - name: Upload extension package
        uses: actions/upload-artifact@v7
        with:
          if-no-files-found: error
          name: extension
          path: extension.zip
          retention-days: 1

  upload-nightly:
    if: ${{ github.ref_name == 'main' && github.event_name != 'pull_request' }}
    needs: [ build-lib, build-extension ]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download library package
        uses: actions/download-artifact@v8
        with:
          name: package

      - name: Download extension package
        uses: actions/download-artifact@v8
        with:
          name: extension

      - name: Update nightly tag
        uses: EndBug/latest-tag@latest
        id: update-nightly-tag
        with:
          ref: nightly

      - name: Publish nightly package release
        if: ${{ steps.update-nightly-tag.outcome == 'success' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload --clobber nightly package.zip extension.zip
