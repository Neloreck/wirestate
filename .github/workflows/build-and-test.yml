name: build-and-test

on:
  push:
    branches:
      - main
      - dev
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          version: 11
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 23
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm build:dts

      - run: pnpm build:cjs

      - run: pnpm build:esm

      - run: pnpm build:ptb

      - run: pnpm build:pkg

      - name: Install zip
        uses: montudor/action-zip@v1

      - name: Archive build artifacts
        working-directory: target/
        run: zip -qq -r package.zip dist/ pkg/

      - name: Upload build package
        uses: actions/upload-artifact@v7
        with:
          if-no-files-found: error
          name: package
          path: target/package.zip
          retention-days: 1

  upload-nightly:
    if: ${{ github.ref_name == 'main' && github.event_name != 'pull_request' }}
    needs: [ build-and-test ]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: package

      - name: Update nightly tag
        uses: EndBug/latest-tag@latest
        id: update-nightly-tag
        with:
          ref: nightly

      - name: Publish nightly package release
        if: ${{ steps.update-nightly-tag.outcome == 'success' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload --clobber nightly package.zip
