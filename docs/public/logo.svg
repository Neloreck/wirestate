<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
  <!-- Improved 8-tooth cog: saturated coral body, open center, darker-coral inner + outer borders. -->
  <defs>
    <mask id="ws-cog-hole">
      <rect x="0" y="0" width="160" height="160" fill="white"/>
      <circle cx="80" cy="80" r="21" fill="black"/>
    </mask>
    <g id="ws-cog">
      <circle cx="80" cy="80" r="40"/>
      <rect x="70" y="13" width="20" height="31" rx="6" transform="rotate(0 80 80)"/>
      <rect x="70" y="13" width="20" height="31" rx="6" transform="rotate(45 80 80)"/>
      <rect x="70" y="13" width="20" height="31" rx="6" transform="rotate(90 80 80)"/>
      <rect x="70" y="13" width="20" height="31" rx="6" transform="rotate(135 80 80)"/>
      <rect x="70" y="13" width="20" height="31" rx="6" transform="rotate(180 80 80)"/>
      <rect x="70" y="13" width="20" height="31" rx="6" transform="rotate(225 80 80)"/>
      <rect x="70" y="13" width="20" height="31" rx="6" transform="rotate(270 80 80)"/>
      <rect x="70" y="13" width="20" height="31" rx="6" transform="rotate(315 80 80)"/>
    </g>
  </defs>
  <use href="#ws-cog" fill="none" stroke="#cc3826" stroke-width="5" stroke-linejoin="round"/>
  <use href="#ws-cog" fill="#ff4733" mask="url(#ws-cog-hole)"/>
  <circle cx="80" cy="80" r="24" fill="none" stroke="#cc3826" stroke-width="6"/>
</svg>
