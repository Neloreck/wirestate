packages:
  - 'cli/'
  - 'src/'
  - 'src/wirestate-core'
  - 'src/wirestate-lit'
  - 'src/wirestate-lit-signals'
  - 'src/wirestate-react'
  - 'src/wirestate-react-mobx'
  - 'src/wirestate-react-signals'
autoInstallPeers: false
allowBuilds:
  core-js: true
  esbuild: true
  unrs-resolver: true
overrides:
  '@types/react': 19.2.15
  '@types/react-dom': 19.2.3
  react: 19.2.6
  react-dom: 19.2.6
minimumReleaseAgeExclude:
  - pnpm@11.1.3
  - '@wirestate/core'
  - '@wirestate/lit'
  - '@wirestate/lit-signals'
  - '@wirestate/react'
  - '@wirestate/react-mobx'
  - '@wirestate/react-signals'
